services:
  tram-display:
    build: .
    restart: unless-stopped
    environment:
      # how often to refresh departures (ms)
      POLL_INTERVAL_MS: 30000
      # departures to show per stop
      DEPARTURES_PER_STOP: 10
      # how far ahead to look (minutes)
      DEPARTURES_WINDOW_MINUTES: 90
      # how often to re-download GTFS (ms) — 24h default
      GTFS_REFRESH_INTERVAL_MS: 86400000

      # configure stops as a JSON array:
      #   stopId   — from GTFS stops.txt (run find-stops script to look up)
      #   name     — display label, anything you like
      #   direction — optional headsign substring filter, case-insensitive
      #               e.g. "Řečkovice" only shows trams going that way
      #               omit or leave empty to show all directions
      STOPS: |
        [
          { "stopId": "U1146Z2", "name": "Hlavní nádraží", "direction": "" },
          { "stopId": "U1146Z1", "name": "Hlavní nádraží", "direction": "" }
        ]